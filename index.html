<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN — Отзывы</title>
    <!-- Добавлен Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-main: #0b0f17;
            --card-bg: #1e293b;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #ffffff;
            --text-body: #f8fafc;
            --text-sub: #94a3b8;
            --btn-primary-bg: #ccff00;
            --btn-primary-text: #000000;
            --btn-secondary-bg: #0f172a;
            --btn-secondary-border: #000000;
            --slider-bg: #1e293b;
            --slider-thumb: #ccff00;
            --icon-color: #ffffff;
            --star-filled: #ccff00;
            --star-empty: transparent;
            --input-bg: #0f172a;
            --admin-red: #ff4d4d;
            --success-green: #2ecc71;
        }

        [data-theme="light"] {
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #000000;
            --text-body: #0f172a;
            --text-sub: #64748b;
            --btn-primary-bg: #000000;
            --btn-primary-text: #ffffff;
            --btn-secondary-bg: #f8fafc;
            --btn-secondary-border: #000000;
            --slider-bg: #ffffff;
            --slider-thumb: #000000;
            --icon-color: #000000;
            --star-filled: #000000;
            --star-empty: transparent;
            --input-bg: #f8fafc;
            --admin-red: #d32f2f;
            --success-green: #27ae60;
        }

        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; background-color: var(--bg-main); color: var(--text-body); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 24px; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; transition: background 0.3s ease; }
        input, textarea { user-select: text !important; -webkit-user-select: text !important; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        .theme-container { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 40px; }
        .theme-switch { position: relative; width: 76px; height: 38px; background: var(--slider-bg); border: 2px solid var(--card-border); border-radius: 0px; box-shadow: 3px 3px 0px var(--shadow-color); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: space-between; transition: background 0.3s ease; }
        .theme-checkbox { display: none; }
        .switch-icon { width: 18px; height: 18px; fill: none; stroke: var(--icon-color); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; z-index: 1; transition: stroke 0.3s ease; margin: 0 4px; }
        .theme-handle { position: absolute; left: 4px; width: 26px; height: 26px; background-color: var(--slider-thumb); border: 2px solid var(--card-border); transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 2; }
        .theme-checkbox:checked + .theme-switch .theme-handle { transform: translateX(38px); }

        .container { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 28px; }
        .brand-header { text-align: center; }
        .brand-title { font-size: 42px; font-weight: 900; letter-spacing: -1px; color: var(--text-title); text-transform: uppercase; -webkit-text-stroke: 1px var(--card-border); }
        .brand-slogan { display: inline-block; font-size: 12px; background: var(--btn-primary-bg); color: var(--btn-primary-text); border: 2px solid var(--card-border); padding: 2px 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; box-shadow: 2px 2px 0px var(--shadow-color); }
        
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .stat-card { background: var(--card-bg); border: 3px solid var(--card-border); padding: 16px; text-align: center; box-shadow: 4px 4px 0px var(--shadow-color); }
        .stat-card h2 { font-size: 32px; font-weight: 900; color: var(--text-title); line-height: 1; margin-bottom: 4px; -webkit-text-stroke: 1px var(--card-border); }
        .stat-card p { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); }

        .section-box { background: var(--card-bg); border: 3px solid var(--card-border); border-radius: 0px; padding: 20px 16px 16px 16px; display: flex; flex-direction: column; gap: 14px; box-shadow: 8px 8px 0px var(--shadow-color); position: relative; }
        .reviews-grid { display: flex; flex-direction: column; gap: 24px; }
        
        .stars-row { display: flex; gap: 4px; align-items: center; }
        .brutal-star { width: 20px; height: 20px; }
        .brutal-star path { stroke: #000000; stroke-width: 2px; stroke-linejoin: miter; transition: fill 0.3s ease; }
        .brutal-star.filled path { fill: var(--star-filled); }
        .brutal-star.empty path { fill: var(--star-empty); }
        
        .review-text { font-size: 14px; line-height: 1.5; color: var(--text-body); word-wrap: break-word; }
        .read-more-btn { background: none; border: none; color: var(--text-title); font-size: 13px; font-weight: 800; cursor: pointer; text-align: left; text-decoration: underline; margin-top: -6px; text-transform: uppercase; }
        
        .user-meta { display: flex; align-items: center; gap: 12px; border-top: 2px dashed var(--card-border); padding-top: 12px; margin-top: 4px; }
        .avatar { width: 32px; height: 32px; background: var(--btn-primary-bg); border: 2px solid var(--card-border); color: var(--btn-primary-text); display: grid; place-items: center; font-weight: 900; font-size: 14px; }
        .username { display: flex; flex-direction: column; font-weight: 800; font-size: 14px; color: var(--text-title); }
        .review-date { font-size: 11px; color: var(--text-sub); font-weight: 500; margin-top: 1px; }

        .admin-reply { margin-top: 4px; padding: 12px; background: var(--btn-secondary-bg); border: 2px solid var(--btn-secondary-border); box-shadow: 4px 4px 0px var(--admin-red); }
        .admin-tag { font-size: 10px; font-weight: 900; color: var(--admin-red); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .admin-text { font-size: 13px; color: var(--text-body); line-height: 1.4; }

        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 16px 20px; font-size: 16px; font-weight: 800; text-decoration: none; border: 2px solid var(--card-border); position: relative; box-shadow: 4px 4px 0px var(--shadow-color); cursor: pointer; transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--shadow-color); }
        .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-text); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; font-weight: 800; font-size: 14px; text-transform: uppercase; border: 3px solid #000; z-index: 9999; display: none; box-shadow: 4px 4px 0px var(--shadow-color); text-align: center; }
        .toast.show { display: block; }
        .toast.error { background: var(--admin-red); color: #fff; }
        .toast.success { background: var(--success-green); color: #fff; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(11, 15, 23, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 24px; }
        .modal { background: var(--card-bg); width: 100%; max-width: 340px; padding: 24px; border: 3px solid var(--card-border); position: relative; box-shadow: 8px 8px 0px var(--shadow-color); }
        .close-modal { position: absolute; top: 12px; right: 16px; font-size: 28px; font-weight: 900; color: var(--text-sub); cursor: pointer; }
        input, textarea { width: 100%; background: var(--input-bg); border: 2px solid var(--card-border); padding: 12px; color: var(--text-body); margin-bottom: 14px; outline: none; font-size: 15px; border-radius: 0px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="theme-container">
        <input type="checkbox" id="themeInput" class="theme-checkbox">
        <label for="themeInput" class="theme-switch">
            <svg class="switch-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <div class="theme-handle"></div>
            <svg class="switch-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </label>
    </div>

    <div id="toast" class="toast"></div>

    <div class="container">
        <header class="brand-header">
            <h1 class="brand-title">ON1X VPN</h1>
            <p class="brand-slogan">Отзывы</p>
        </header>

        <div class="stats-container">
            <div class="stat-card"><h2 id="avgRating">0.0</h2><p>Рейтинг</p></div>
            <div class="stat-card"><h2 id="totalCount">0</h2><p>Отзывов</p></div>
        </div>

        <div class="section-box" style="text-align: center; gap: 18px;">
            <p style="font-size: 14px; font-weight: 600; color: var(--text-sub);">Ваше мнение помогает проекту становиться лучше</p>
            <button class="btn btn-primary" id="addBtn">ОСТАВИТЬ ОТЗЫВ</button>
        </div>

        <div class="reviews-grid" id="grid"></div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <span class="close-modal" id="closeBtn">&times;</span>
            <input type="text" id="nameInp" placeholder="Ваше имя" autocomplete="off">
            <input type="text" id="contactInp" placeholder="ID или @username" autocomplete="off">
            <textarea id="msgInp" rows="4" placeholder="Напишите ваш отзыв..."></textarea>
            <button class="btn btn-primary" id="saveBtn">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://yvnnngfzzjdbeiscwluy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bm5uZ2Z6empkYmVpc2N3bHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2ODYsImV4cCI6MjA5MDA1MjY4Nn0.SesGG2QhbJKfAklZDiL8oolWQ6qaTtBwRL_tvigpd9A';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        const grid = document.getElementById('grid');
        const overlay = document.getElementById('overlay');
        const contactInp = document.getElementById('contactInp');
        
        // Авто-распознавание Telegram и фиксация ID
        const tg = window.Telegram?.WebApp;
        if (tg?.initDataUnsafe?.user) {
            document.getElementById('nameInp').value = tg.initDataUnsafe.user.first_name;
            contactInp.value = tg.initDataUnsafe.user.id;
            contactInp.readOnly = true; // Запрет на изменение
            contactInp.style.opacity = "0.7";
        }

        function getStarSvg(isFilled) {
            return `<svg class="brutal-star ${isFilled ? 'filled' : 'empty'}" viewBox="0 0 24 24"><path d="M12 1.7l3.09 6.26L22 8.9l-5 4.87L18.18 22 12 18.75 5.82 22 7 13.77 2 8.9l6.91-.94L12 1.7z"/></svg>`;
        }

        async function fetchReviews() {
            let { data } = await supabaseClient.from('reviews').select('*').in('proverka', [1, 2]).order('created_at', { ascending: false });
            if (data) render(data);
        }

        function render(data) {
            grid.innerHTML = data.map((r) => {
                const date = new Date(r.created_at).toLocaleDateString('ru-RU');
                const source = r.source ? ` • ${r.source}` : '';
                return `
                <div class="section-box">
                    <div class="stars-row">${Array.from({length: 5}, (_, i) => getStarSvg(i < r.stars)).join('')}</div>
                    <p class="review-text">${r.msg}</p>
                    <div class="user-meta">
                        <div class="avatar">${r.name ? r.name[0].toUpperCase() : '?'}</div>
                        <div class="username">
                            <span>${r.name}</span>
                            <span class="review-date">${date}${source}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('saveBtn').addEventListener('pointerdown', async () => {
            const name = document.getElementById('nameInp').value.trim();
            const contact = contactInp.value.trim();
            const msg = document.getElementById('msgInp').value.trim();
            const source = tg?.initDataUnsafe?.user ? 'Telegram' : 'Сайт';
            
            if(!name || !msg) return;
            await supabaseClient.from('reviews').insert([{ 
                name, 
                contact, 
                msg, 
                stars: 5, 
                source, 
                proverka: 0 
            }]);
            overlay.style.display = 'none';
            alert("Отправлено на модерацию!");
        });

        document.getElementById('addBtn').addEventListener('pointerdown', () => overlay.style.display = 'flex');
        document.getElementById('closeBtn').addEventListener('pointerdown', () => overlay.style.display = 'none');
        fetchReviews();
    </script>
</body>
</html>
